name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    # macOS runner: v1 is macOS-only (spec §1.3) and native modules must be
    # rebuilt against the Electron ABI on the same platform we ship.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm ci` runs the `postinstall` rebuild automatically; the explicit
      # @electron/rebuild below is a belt-and-suspenders guard for the top setup risk.
      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron ABI
        run: npx @electron/rebuild -f -w better-sqlite3,node-pty

      - name: Full gate (tsc -b && eslint && vitest run && electron-vite build)
        run: npm run check
